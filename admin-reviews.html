<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moderacio de comentaris | frolesti</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin-reviews.css">
</head>
<body>
  <main class="admin-shell">
    <section class="admin-panel admin-panel-auth" id="authPanel">
      <h1>Panell de moderacio</h1>
      <p class="muted">Aquesta pagina es privada. Introdueix la clau per gestionar comentaris pendents.</p>
      <form id="authForm" class="auth-form" novalidate>
        <label for="adminKey">Clau admin</label>
        <input id="adminKey" name="adminKey" type="password" autocomplete="off" required>
        <button type="submit" class="btn btn-primary">Entrar</button>
      </form>
      <p class="status" id="authStatus" hidden></p>
    </section>

    <section class="admin-panel admin-panel-dashboard" id="dashboard" hidden>
      <header class="dashboard-header">
        <div>
          <h2>Comentaris pendents</h2>
          <p class="muted">Revisa i decideix que publicar.</p>
        </div>
        <div class="header-actions">
          <button type="button" id="refreshBtn" class="btn">Refrescar</button>
          <button type="button" id="logoutBtn" class="btn btn-ghost">Sortir</button>
        </div>
      </header>

      <div class="stats" id="stats"></div>
      <p class="status" id="dashboardStatus" hidden></p>
      <div class="pending-list" id="pendingList"></div>
    </section>
  </main>

  <script src="admin-reviews.js" defer></script>
</body>
</html>
