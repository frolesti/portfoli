name: Butlletí Mensual

on:
  schedule:
    # Dia 1 de cada mes a les 9:00 AM UTC
    - cron: '0 9 1 * *'
  workflow_dispatch:

jobs:
  send-newsletter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Fetch subscribers from Gist
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          echo "📋 Descarregant subscriptors del Gist..."
          curl -sf -H "Authorization: Bearer $GH_PAT" \
            "https://api.github.com/gists/$GIST_ID" | \
            node -e "
              const fs = require('fs');
              const data = JSON.parse(fs.readFileSync('/dev/stdin', 'utf8'));
              const content = data.files['subscribers.json'].content;
              fs.writeFileSync('newsletter/scripts/subscribers.json', content);
              const subs = JSON.parse(content);
              console.log('✅ ' + subs.length + ' subscriptors carregats');
            "

      - name: Generate newsletter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run newsletter:generate

      - name: Send emails
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: npm run newsletter:send

      - name: Upload newsletter artifact
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-${{ github.run_number }}
          path: newsletter/output/*.html
          retention-days: 90
